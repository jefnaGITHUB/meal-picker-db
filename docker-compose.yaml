version: "3.8"

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mealsdb
    volumes:
      - db-data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: mealsdb
      BACKEND_PORT: 3100
    ports:
      - "3100"

  frontend:
    build: ./frontend
    environment:
      VITE_BACKEND_URL: http://backend:3100
    ports:
      - "80"

volumes:
  db-data:
